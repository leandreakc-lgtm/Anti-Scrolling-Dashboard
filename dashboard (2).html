<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarity Canvas - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
        }

        h1 {
            font-size: 32px;
            color: #1a1a1a;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
        }

        /* Sidebar */
        .sidebar {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .sidebar h2 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #1a1a1a;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 8px;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
        }

        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            transition: all 0.2s;
        }

        .btn-add {
            width: 100%;
            background: #2563eb;
            color: white;
            padding: 10px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .btn-add:hover {
            background: #1d4ed8;
        }

        .btn-add:active {
            transform: scale(0.98);
        }

        .divider {
            border-top: 1px solid #e0e0e0;
            margin: 20px 0;
        }

        .category-list {
            list-style: none;
        }

        .category-item {
            background: none;
            border: none;
            width: 100%;
            text-align: left;
            padding: 10px 12px;
            margin-bottom: 4px;
            border-radius: 6px;
            font-size: 13px;
            color: #333;
            cursor: pointer;
            transition: background 0.2s;
        }

        .category-item:hover {
            background: #f0f0f0;
        }

        .category-item.active {
            background: #2563eb;
            color: white;
            font-weight: 500;
        }

        /* Main Content */
        .content {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 30px;
            min-height: 400px;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .content-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .btn-refresh {
            background: #f0f0f0;
            color: #333;
            padding: 8px 14px;
            font-size: 12px;
        }

        .btn-refresh:hover {
            background: #e0e0e0;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #1a1a1a;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .card {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
            position: relative;
        }

        .card:hover {
            border-color: #2563eb;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
            transform: translateY(-2px);
        }

        .card-category {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #999;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .card:hover .card-title {
            color: #2563eb;
        }

        .card-url {
            font-size: 11px;
            color: #999;
            word-break: break-all;
            flex-grow: 1;
            margin-bottom: 10px;
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            flex: 1;
            padding: 6px 8px;
            font-size: 11px;
            background: white;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-small:hover {
            background: #f0f0f0;
        }

        .btn-delete {
            color: #999;
            font-weight: 600;
        }

        .btn-delete:hover {
            color: #e74c3c;
        }

        @media (max-width: 768px) {
            .main-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: relative;
                top: 0;
            }

            .grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Clarity Canvas</h1>
            <p class="subtitle">Your curated dashboard. No algorithm.</p>
        </header>

        <div class="main-layout">
            <!-- Sidebar -->
            <aside class="sidebar">
                <h2>Add Site</h2>
                <div class="form-group">
                    <input type="text" id="siteUrl" placeholder="https://example.com">
                    <input type="text" id="siteName" placeholder="Site name">
                    <input type="text" id="siteCategory" placeholder="Category (optional)">
                    <button class="btn-add" onclick="addSite()">+ Add</button>
                </div>

                <div class="divider"></div>

                <h2>Backup</h2>
                <div class="form-group">
                    <button class="btn-small" onclick="exportSites()" style="width: 100%; margin-bottom: 8px;">⬇ Export Sites</button>
                    <label style="display: block; width: 100%; cursor: pointer;">
                        <button class="btn-small" onclick="document.getElementById('importFile').click()" style="width: 100%;">⬆ Import Sites</button>
                        <input type="file" id="importFile" accept=".json" onchange="importSites(event)" style="display: none;">
                    </label>
                </div>

                <div class="divider"></div>

                <h2>Categories</h2>
                <ul class="category-list" id="categoryList">
                    <li><button class="category-item active" onclick="filterCategory(null)">All Sites</button></li>
                </ul>
            </aside>

            <!-- Main Content -->
            <main class="content">
                <div class="content-header">
                    <div class="content-title" id="contentTitle">All Sites</div>
                    <button class="btn-refresh" onclick="refreshDisplay()">↻ Refresh</button>
                </div>

                <div id="sitesGrid" class="grid">
                    <div class="empty-state">
                        <h3>Start Building</h3>
                        <p>Add websites you want to visit regularly</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        let sites = [];
        let selectedCategory = null;

        // Load from localStorage
        function loadSites() {
            try {
                const saved = localStorage.getItem('claritySites');
                if (saved) {
                    sites = JSON.parse(saved);
                    console.log('Loaded sites:', sites);
                    renderCategories();
                    renderSites();
                }
            } catch (e) {
                console.error('Error loading sites:', e);
                // If localStorage fails, try to recover from backup
                const backup = sessionStorage.getItem('claritySitesBackup');
                if (backup) {
                    sites = JSON.parse(backup);
                    renderCategories();
                    renderSites();
                }
            }
        }

        // Save to localStorage with backup
        function saveSites() {
            try {
                localStorage.setItem('claritySites', JSON.stringify(sites));
                // Also backup to sessionStorage
                sessionStorage.setItem('claritySitesBackup', JSON.stringify(sites));
                console.log('Sites saved successfully');
            } catch (e) {
                console.error('Error saving sites:', e);
                alert('Warning: Sites may not save properly. Try hosting online.');
            }
        }

        // Add new site
        function addSite() {
            const url = document.getElementById('siteUrl').value.trim();
            const name = document.getElementById('siteName').value.trim();
            const category = document.getElementById('siteCategory').value.trim() || 'Uncategorized';

            if (!url || !name) {
                alert('Please enter both URL and site name');
                return;
            }

            // Add https if missing
            let fullUrl = url;
            if (!url.startsWith('http')) {
                fullUrl = 'https://' + url;
            }

            sites.push({
                id: Date.now(),
                url: fullUrl,
                name: name,
                category: category
            });

            document.getElementById('siteUrl').value = '';
            document.getElementById('siteName').value = '';
            document.getElementById('siteCategory').value = '';

            saveSites();
            renderCategories();
            renderSites();
        }

        // Delete site
        function deleteSite(id) {
            if (confirm('Delete this site?')) {
                sites = sites.filter(s => s.id !== id);
                saveSites();
                renderCategories();
                renderSites();
            }
        }

        // Filter by category
        function filterCategory(category) {
            selectedCategory = category;
            
            // Update active button
            document.querySelectorAll('.category-item').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            renderSites();
        }

        // Render categories
        function renderCategories() {
            const categories = [...new Set(sites.map(s => s.category))];
            const categoryList = document.getElementById('categoryList');
            
            categoryList.innerHTML = '<li><button class="category-item active" onclick="filterCategory(null)">All Sites</button></li>';
            
            categories.forEach(cat => {
                const count = sites.filter(s => s.category === cat).length;
                categoryList.innerHTML += `
                    <li><button class="category-item" onclick="filterCategory('${cat}')">${cat} (${count})</button></li>
                `;
            });
        }

        // Render sites grid
        function renderSites() {
            const grid = document.getElementById('sitesGrid');
            const title = document.getElementById('contentTitle');
            
            let displaySites = sites;
            if (selectedCategory) {
                displaySites = sites.filter(s => s.category === selectedCategory);
                title.textContent = selectedCategory;
            } else {
                title.textContent = `All Sites (${sites.length})`;
            }

            if (displaySites.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <h3>No sites yet</h3>
                        <p>Add your first site to get started</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = displaySites.map(site => `
                <a href="${site.url}" target="_blank" class="card">
                    <div class="card-category">${site.category}</div>
                    <div class="card-title">${site.name}</div>
                    <div class="card-url">${new URL(site.url).hostname}</div>
                    <div class="card-actions">
                        <button class="btn-small" onclick="window.open('${site.url}', '_blank'); return false;">Visit</button>
                        <button class="btn-small btn-delete" onclick="deleteSite(${site.id}); return false;">Delete</button>
                    </div>
                </a>
            `).join('');
        }

        // Refresh display
        function refreshDisplay() {
            renderSites();
        }

        // Allow Enter key to add site
        document.addEventListener('keypress', function(e) {
            if (e.target.id === 'siteCategory' && e.key === 'Enter') {
                addSite();
            }
        });

        // Export sites as JSON file
        function exportSites() {
            if (sites.length === 0) {
                alert('No sites to export');
                return;
            }
            const dataStr = JSON.stringify(sites, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'clarity-sites.json';
            link.click();
            URL.revokeObjectURL(url);
        }

        // Import sites from JSON file
        function importSites(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        sites = imported;
                        saveSites();
                        renderCategories();
                        renderSites();
                        alert('Sites imported successfully!');
                    } else {
                        alert('Invalid file format');
                    }
                } catch (err) {
                    alert('Error reading file: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        // Load on startup
        loadSites();
    </script>
</body>
</html>
